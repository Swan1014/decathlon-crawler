name: Night Crawler (Decathlon Scraper)

# 'Run workflow' 버튼을 누를 때만 수동으로 실행되게 설정
on:
  workflow_dispatch: 

jobs:
  scrape-job:
    runs-on: ubuntu-latest # GitHub의 우분투 컴퓨터 빌리기

    steps:
    # 1. 내 코드 가져오기
    - name: 📥 소스코드 가져오기
      uses: actions/checkout@v4

    # 2. 파이썬 설치하기
    - name: 🐍 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 필요한 패키지 설치하기
    - name: 📦 패키지 설치 (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 크롤링 파이썬 코드 실행! (여기서 시간이 오래 걸려)
    - name: 🚀 크롤러 실행!
      run: python decathlon_crawler.py

    # 5. 크롤링 끝난 후 'dataset' 폴더를 압축해서 나한테 전달 준비!
    - name: 💾 결과물 저장 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: decathlon-dataset # 내일 다운받을 압축파일 이름
        path: dataset/          # 저장할 폴더 경로
